syntax = "proto3";

package dio;

option go_package = "github.com/nisaral/dio/api/proto;pb";

import "google/protobuf/empty.proto";

service Orchestrator {
  // Python workers call this to announce they are ready
  rpc RegisterWorker (RegisterRequest) returns (RegisterResponse);
  // Client calls this to request inference
  rpc Infer (InferenceRequest) returns (InferenceResponse);
  rpc ExecuteInference (InferenceRequest) returns (InferenceResponse);
}

service InferenceWorker {
  rpc Predict (InferenceRequest) returns (InferenceResponse);
  rpc CheckHealth (google.protobuf.Empty) returns (google.protobuf.Empty);
}

message RegisterRequest {
  string worker_id = 1;
  string address = 2; // e.g., "localhost:50051"
  repeated string models = 3;
  string tier = 4;
  int64 vram_gb = 5;
  string engine_type = 6;  // "vllm", "hf", "mock" (v3)
  int64 free_vram_mb = 7;  // Real-time free VRAM from NVML (v3)
}

message RegisterResponse {
  bool success = 1;
}

message InferenceRequest {
  string model_id = 1;
  bytes data = 2;
  string tier = 3;
}

message InferenceResponse {
  bytes output = 1;
  float latency_ms = 2;
  int64 tokens_used = 3;
  float ttft_ms = 4;
  int64 prompt_tokens = 5;     // From vLLM usage.prompt_tokens (v3)
  int64 completion_tokens = 6; // From vLLM usage.completion_tokens (v3)
}